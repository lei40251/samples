<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=yes, initial-scale=1, maximum-scale=1">

    <title>Peer connection</title>

    <style>
        video {
            width: 180px;
        }
        .remoteVideo{
            width: 150px;
        }
    </style>
</head>

<body>

    <div id="container">
        <h1>
            <span>Peer connection</span>
        </h1>

        <div class="box">
            <button id="startButton">Start</button>
            <button id="callButton">Call</button>
            <button id="insertStream">InsertStream</button>
            <button id="hangupButton">Hang Up</button>
        </div>
        <div class="box" style="display: none;">
            <span>SDP Semantics:</span>
            <select id="sdpSemantics">
                <option selected value="">Default</option>
                <option value="unified-plan">Unified Plan</option>
                <option value="plan-b">Plan B</option>
            </select>
        </div>

        <video id="localVideo" playsinline autoplay muted></video>
        <video class="remoteVideo" playsinline autoplay></video>
        <video class="remoteVideo" playsinline autoplay></video>
        <video class="remoteVideo" playsinline autoplay></video>
        <video class="remoteVideo" playsinline autoplay></video>
        <video class="remoteVideo" playsinline autoplay></video>
        <video class="remoteVideo" playsinline autoplay></video>
        <video class="remoteVideo" playsinline autoplay></video>
        <video class="remoteVideo" playsinline autoplay></video>
        <video class="remoteVideo" playsinline autoplay></video>
        <video class="remoteVideo" playsinline autoplay></video>


    </div>

    <script src="./js/adapter-latest.js"></script>
    <script src="./js/main.js" async></script>
</body>

</html>
